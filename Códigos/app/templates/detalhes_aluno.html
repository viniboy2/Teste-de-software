<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Aluno | Secretaria DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-[32px] text-center">
                <div class="w-32 h-32 bg-cyan-500 rounded-full mx-auto mb-4 border-4 border-white/10"></div>
                <h2 class="text-2xl font-bold">Samuel Galvão</h2>
                <p class="text-cyan-400">Matrícula: 20260421</p>
                <p class="text-gray-400 text-sm mt-2">Nasc: 15/05/2008</p>
            </div>
            <div class="lg:col-span-2 glass-card p-8 rounded-[32px]">
                <h3 class="text-xl font-bold mb-6">Relatórios Acadêmicos</h3>
                <div class="flex gap-4 border-b border-white/10 mb-6">
                    <button class="pb-2 border-b-2 border-cyan-400">Histórico</button>
                    <button class="pb-2 text-gray-500">Saúde</button>
                    <button class="pb-2 text-gray-500">Evolução</button>
                </div>
                <div class="bg-white/5 p-4 rounded-xl mb-4 flex justify-between">
                    <span>Historico_Escolar_2025.pdf</span>
                    <button class="text-cyan-400">Baixar</button>
                </div>
                <div class="flex justify-end mt-10">
                    <button class="bg-white/10 px-6 py-3 rounded-xl border border-white/20">📥 Importar Dados</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
