<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Secretaria Escolar DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="glass p-10 rounded-[32px] w-full max-w-md shadow-2xl">
        <h1 class="text-white text-3xl font-bold text-center mb-8">Secretaria DF</h1>
        <form action="dashboard.html" class="space-y-6">
            <input type="email" placeholder="E-mail Institucional" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-cyan-500">
            <input type="password" placeholder="Senha" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-cyan-500">
            <button class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-4 rounded-xl">Acessar Sistema</button>
        </form>
    </div>
</body>
</html>
